<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000; color: #fff;
      font-family: 'Inter', sans-serif; font-size: 14px;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* HEADER */
    header {
      padding: 18px 28px; border-bottom: 1px solid #1a1a1a;
      display: flex; align-items: center; gap: 10px;
    }
    .title { font-size: 16px; font-weight: 600; letter-spacing: 1px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #3f3; display: none; flex-shrink: 0; }
    .add-btn {
      margin-left: auto; background: #fff; color: #000;
      border: none; padding: 7px 16px; font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px;
    }
    .add-btn:hover { opacity: .85; }

    /* MAIN */
    main { flex: 1; padding: 24px 28px; max-width: 700px; width: 100%; margin: 0 auto; }

    /* SEARCH */
    .bar { margin-bottom: 12px; }
    .bar input {
      width: 100%; background: #000; border: 1px solid #222;
      color: #fff; padding: 9px 12px; font-family: 'Inter', sans-serif;
      font-size: 13px; outline: none; border-radius: 6px;
    }
    .bar input:focus { border-color: #444; }

    #info { color: #333; font-size: 12px; margin-bottom: 16px; }

    /* LIST */
    #list { display: flex; flex-direction: column; }

    .link-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid #0f0f0f;
    }
    .link-body { flex: 1; overflow: hidden; }
    .link-name {
      color: #fff; font-size: 14px; font-weight: 500;
      text-decoration: none; display: inline;
      border-bottom: 1px solid #333;
    }
    .link-name:hover { border-color: #fff; }
    .link-url {
      color: #3a3a3a; font-size: 11px; margin-top: 3px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .link-desc { color: #555; font-size: 12px; margin-top: 3px; }
    .link-time { color: #222; font-size: 11px; margin-top: 4px; }

    .btn-del {
      background: none; border: none; color: #2a2a2a;
      font-size: 18px; cursor: pointer; padding: 0 2px;
      line-height: 1; flex-shrink: 0; margin-top: 1px;
      transition: color .1s;
    }
    .btn-del:hover { color: #f55; }

    /* STATES */
    .msg { text-align: center; padding: 70px 0; color: #2a2a2a; line-height: 2.2; }
    .loader { width: 18px; height: 18px; border: 1px solid #222; border-top-color: #666; border-radius: 50%; animation: sp .6s linear infinite; margin: 80px auto; }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* MODAL */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.88); z-index: 100;
      align-items: center; justify-content: center;
    }
    .overlay.show { display: flex; }
    .modal {
      background: #0a0a0a; border: 1px solid #222;
      padding: 26px 24px; width: 360px; max-width: 94vw;
      display: flex; flex-direction: column; gap: 14px;
      border-radius: 10px; animation: up .15s ease;
    }
    @keyframes up { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .modal h2 { font-size: 14px; font-weight: 600; color: #fff; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; color: #555; font-weight: 500; letter-spacing: .5px; text-transform: uppercase; }
    .field input {
      background: #000; border: 1px solid #222; color: #fff;
      padding: 9px 11px; font-family: 'Inter', sans-serif; font-size: 13px;
      outline: none; border-radius: 6px;
    }
    .field input:focus { border-color: #444; }

    .err { color: #f55; font-size: 12px; min-height: 16px; }

    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button {
      flex: 1; font-family: 'Inter', sans-serif; font-size: 13px;
      font-weight: 500; padding: 9px; border-radius: 6px; cursor: pointer;
    }
    .bc { background: #000; color: #555; border: 1px solid #222; }
    .bc:hover { color: #fff; border-color: #444; }
    .bo { background: #fff; color: #000; border: none; }
    .bo:hover { opacity: .85; }
    .bo:disabled { opacity: .3; cursor: not-allowed; }

    footer { text-align: center; color: #111; font-size: 11px; padding: 14px; border-top: 1px solid #0f0f0f; }

    @media (max-width: 520px) { header, main { padding: 14px; } }
  </style>
</head>
<body>

<header>
  <span class="title">Links</span>
  <div class="dot" id="dot"></div>
  <button class="add-btn" onclick="openModal()">+ Thêm</button>
</header>

<main>
  <div class="bar">
    <input id="q" type="text" placeholder="Tìm kiếm..." oninput="render()" />
  </div>
  <div id="info"></div>
  <div id="list"><div class="loader"></div></div>
</main>

<footer>cloudflare kv · noindex</footer>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <h2 id="modal-title">Xác thực</h2>

    <div id="step-auth" style="display:flex;flex-direction:column;gap:14px;">
      <div class="field">
        <label>Mật khẩu</label>
        <input id="pass" type="password" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')doAuth()" />
      </div>
      <div class="err" id="auth-err"></div>
      <div class="modal-btns">
        <button class="bc" onclick="closeModal()">Huỷ</button>
        <button class="bo" onclick="doAuth()">Xác nhận</button>
      </div>
    </div>

    <div id="step-add" style="display:none;flex-direction:column;gap:14px;">
      <div class="field">
        <label>Tên hiển thị *</label>
        <input id="in-name" type="text" placeholder="Tên link..." />
      </div>
      <div class="field">
        <label>URL *</label>
        <input id="in-url" type="text" placeholder="https://..." />
      </div>
      <div class="field">
        <label>Mô tả (tuỳ chọn)</label>
        <input id="in-desc" type="text" placeholder="Ghi chú..." />
      </div>
      <div class="err" id="add-err"></div>
      <div class="modal-btns">
        <button class="bc" onclick="closeModal()">Huỷ</button>
        <button class="bo" id="btn-add" onclick="doAdd()">Thêm</button>
      </div>
    </div>
  </div>
</div>

<script>
const W = "https://linkcloud.duongminhminh46.workers.dev";

let all = [], pass = null;

const fmtTime = ts => new Date(ts).toLocaleDateString("vi-VN", {
  day: "2-digit", month: "2-digit", year: "numeric",
  hour: "2-digit", minute: "2-digit"
});

async function load() {
  try {
    const r = await fetch(W + "/list");
    all = await r.json();
    render();
    document.getElementById("info").textContent = all.length + " link";
  } catch {
    document.getElementById("list").innerHTML = `<div class="msg">Không kết nối được Worker.</div>`;
  }
}

function render() {
  const q = document.getElementById("q").value.toLowerCase();
  const list = all.filter(f =>
    f.name.toLowerCase().includes(q) ||
    f.url.toLowerCase().includes(q) ||
    (f.desc || "").toLowerCase().includes(q)
  );
  const el = document.getElementById("list");
  if (!list.length) { el.innerHTML = `<div class="msg">Không có link nào.</div>`; return; }
  el.innerHTML = list.map(f => `
    <div class="link-row">
      <div class="link-body">
        <a class="link-name" href="${f.url}" target="_blank" rel="noopener">${f.name}</a>
        <div class="link-url">${f.url}</div>
        ${f.desc ? `<div class="link-desc">${f.desc}</div>` : ""}
        <div class="link-time">${fmtTime(f.addedAt)}</div>
      </div>
      ${pass ? `<button class="btn-del" onclick="doDel('${f.id}')" title="Xoá">×</button>` : ""}
    </div>`).join("");
}

function openModal() {
  document.getElementById("overlay").classList.add("show");
  if (pass) { showAdd(); return; }
  document.getElementById("step-auth").style.display = "flex";
  document.getElementById("step-add").style.display = "none";
  document.getElementById("modal-title").textContent = "Xác thực";
  setTimeout(() => document.getElementById("pass").focus(), 60);
}

function closeModal() {
  document.getElementById("overlay").classList.remove("show");
  ["pass","in-name","in-url","in-desc"].forEach(id => document.getElementById(id).value = "");
  ["auth-err","add-err"].forEach(id => document.getElementById(id).textContent = "");
  document.getElementById("btn-add").disabled = false;
}

function bgClose(e) { if (e.target === document.getElementById("overlay")) closeModal(); }

function showAdd() {
  document.getElementById("step-auth").style.display = "none";
  document.getElementById("step-add").style.display = "flex";
  document.getElementById("modal-title").textContent = "Thêm link";
  setTimeout(() => document.getElementById("in-name").focus(), 60);
}

async function doAuth() {
  const p = document.getElementById("pass").value;
  if (!p) return;
  const errEl = document.getElementById("auth-err");
  errEl.textContent = "Đang kiểm tra...";
  try {
    const r = await fetch(W + "/auth", { method: "POST", headers: { "x-password": p } });
    if (r.status === 401) {
      errEl.textContent = "Sai mật khẩu.";
      document.getElementById("pass").value = "";
      return;
    }
    pass = p;
    document.getElementById("dot").style.display = "block";
    errEl.textContent = "";
    showAdd();
    render();
  } catch { errEl.textContent = "Lỗi kết nối."; }
}

async function doAdd() {
  const name = document.getElementById("in-name").value.trim();
  const url  = document.getElementById("in-url").value.trim();
  const desc = document.getElementById("in-desc").value.trim();
  const errEl = document.getElementById("add-err");
  if (!name || !url) { errEl.textContent = "Điền đủ tên và URL."; return; }
  const btn = document.getElementById("btn-add");
  btn.disabled = true;
  try {
    const r = await fetch(W + "/add", {
      method: "POST",
      headers: { "x-password": pass, "Content-Type": "application/json" },
      body: JSON.stringify({ name, url, desc }),
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || "Thất bại."; btn.disabled = false; return; }
    closeModal();
    await load();
  } catch { errEl.textContent = "Lỗi kết nối."; btn.disabled = false; }
}

async function doDel(id) {
  if (!pass || !confirm("Xoá link này?")) return;
  await fetch(W + "/delete", {
    method: "DELETE",
    headers: { "x-password": pass, "Content-Type": "application/json" },
    body: JSON.stringify({ id }),
  });
  await load();
}

load();
</script>
</body>
</html>
